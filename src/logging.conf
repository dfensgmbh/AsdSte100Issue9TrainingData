[loggers]
keys=root,openai,litellm,LiteLLM,httpx,httpcore,aiohttp,instructor,instructorPatch,response,asyncio,markdownIt,markdownItParser

[handlers]
keys=fileHandler,richHandler,richHandlerOnlyError

[formatters]
keys=defaultFormatter,richFormatter

[logger_root]
level=DEBUG
handlers=fileHandler,richHandler

[logger_openai]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=openai
propagate=0

[logger_litellm]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=litellm
propagate=0

[logger_LiteLLM]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=LiteLLM
propagate=0

[logger_httpx]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=httpx
propagate=0

[logger_httpcore]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=httpcore
propagate=0

[logger_aiohttp]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=aiohttp
propagate=0

[logger_instructor]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=instructor
propagate=0

[logger_instructorPatch]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=instructor.patch
propagate=0

[logger_response]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=response
propagate=0

[logger_asyncio]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=asyncio
propagate=0

[logger_markdownIt]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=markdown_it
propagate=0

[logger_markdownItParser]
level=DEBUG
handlers=richHandlerOnlyError,fileHandler
qualname=markdown_it.rules_block
propagate=0


[handler_richHandler]
class=rich.logging.RichHandler
level=DEBUG
formatter=richFormatter
args=()
kwargs={"log_time_format": "%%H:%%M:%%S", "rich_tracebacks": 'True', "markup": 'True', "show_path": 'True'}

[handler_richHandlerOnlyError]
class=rich.logging.RichHandler
level=ERROR
formatter=richFormatter
args=()
kwargs={"log_time_format": "%%H:%%M:%%S", "rich_tracebacks": 'True', "markup": 'True', "show_path": 'True'}

[handler_consoleHandler]
class=StreamHandler
level=ERROR
formatter=defaultFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=defaultFormatter
args=('app.log', 'w')
encoding=utf-8

[formatter_richFormatter]
# format=%(module)s - %(message)s
format=%(message)s

[formatter_defaultFormatter]
format=%(asctime)s - %(process)d - %(thread)d - %(levelname)s - %(module)s - %(message)s
